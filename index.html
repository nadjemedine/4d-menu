<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>معرض الموديلات ثلاثية الأبعاد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --primary: #d97706; /* Golden Crust */
      --secondary: #fbbf24; /* Warm Glow */
      --bg: #110c08; /* Dark Chocolate */
      --card-bg: rgba(255, 238, 225, 0.05);
      --glass: rgba(217, 119, 6, 0.1);
      --text: #fff7ed;
    }

    * {
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Background Animation */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #2b1d0e 0%, #110c08 100%);
    }

    .circle {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.15;
    }

    .circle-1 { top: -100px; right: -100px; background: var(--primary); }
    .circle-2 { bottom: -100px; left: -100px; background: var(--secondary); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInDown 1s ease;
    }

    p {
      color: #94a3b8;
      font-size: 1.2rem;
      margin-bottom: 50px;
      animation: fadeInUp 1s ease;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      animation: fadeIn 1.5s ease;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass);
      border-radius: 24px;
      overflow: hidden;
      padding: 20px;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card model-viewer {
      width: 100%;
      height: 250px;
      background-color: transparent;
      pointer-events: none; /* Disable interaction in gallery */
    }

    .card h3 {
      font-size: 1.5rem;
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .card .price {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--secondary);
      margin-bottom: 10px;
    }

    .card .btn {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(45deg, var(--primary), #e63946);
      border-radius: 12px;
      font-weight: bold;
      margin-top: 10px;
      opacity: 0.8;
    }

    .card:hover .btn {
      opacity: 1;
      transform: scale(1.05);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Header Styles */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      background: rgba(17, 12, 8, 0.8);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass);
      z-index: 1000;
      box-sizing: border-box;
    }

    .logo img {
      height: 60px;
      border-radius: 12px;
      cursor: pointer;
    }

    .header-actions {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .header-actions .icon {
      cursor: pointer;
      width: 28px;
      height: 28px;
      color: var(--primary);
      transition: transform 0.3s ease;
    }

    .header-actions .icon:hover {
      transform: scale(1.1);
      color: var(--secondary);
    }

    .social-dropdown {
      position: relative;
    }

    .dropdown-content {
      position: absolute;
      top: 40px;
      left: 0;
      background: #1c1917;
      border: 1px solid var(--glass);
      border-radius: 12px;
      padding: 10px;
      width: 180px;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: fadeInDown 0.3s ease;
    }

    .social-dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .dropdown-content a:hover {
      background: var(--glass);
      color: var(--primary);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 20px 40px 20px; /* Shift content down for header */
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="logo.png" alt="شعاري المخبزة">
    </div>

    <div class="header-actions">
      <!-- Search Icon -->
      <a href="#" style="color: inherit;">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </a>

      <!-- Menu Dropdown -->
      <div class="social-dropdown">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>

        <div class="dropdown-content">
          <p style="margin: 5px 10px; font-weight: bold; color: var(--secondary);">تواصل معنا</p>
          <a href="#">
            <span>انستغرام</span>
          </a>
          <a href="#">
            <span>فيسبوك</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="bg-gradient"></div>

  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>

  <div class="container">
    <h1>القائمة</h1>
    <p>استكشف تشكيلتنا الفاخرة بشكل تفاعلي</p>

    <div class="grid">
      <!-- Dish -->
      <a href="dish.html" class="card">
        <model-viewer src="dish.glb" auto-rotate environment-image="neutral" shadow-intensity="1"></model-viewer>
        <h3>الطبق الرئيسي</h3>
        <div class="price">1200 د.ج</div>
        <div class="btn">عرض التفاصيل</div>
      </a>

      <!-- Cockies -->
      <a href="cockies.html" class="card">
        <model-viewer src="cockies.glb" auto-rotate environment-image="neutral" shadow-intensity="1"></model-viewer>
        <h3>كوكيز الشوكولاتة</h3>
        <div class="price">450 د.ج</div>
        <div class="btn">عرض التفاصيل</div>
      </a>

      <!-- Croissant -->
      <a href="croissant.html" class="card">
        <model-viewer src="croissant.glb" auto-rotate environment-image="neutral" shadow-intensity="1"></model-viewer>
        <h3>كرواسون فرنسي</h3>
        <div class="price">350 د.ج</div>
        <div class="btn">عرض التفاصيل</div>
      </a>

      <!-- Mini Cake -->
      <a href="mini-cake.html" class="card">
        <model-viewer src="mini-cake.glb" auto-rotate environment-image="neutral" shadow-intensity="1"></model-viewer>
        <h3>ميني كيك</h3>
        <div class="price">750 د.ج</div>
        <div class="btn">عرض التفاصيل</div>
      </a>

    </div>
  </div>

</body>
</html>
